global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: 'production'
    app: 'retail-arbitrage-intelligence'

scrape_configs:
  - job_name: 'rai-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
