version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rai_user
      POSTGRES_PASSWORD: rai_password
      POSTGRES_DB: rai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rai_user -d rai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rai_network

  redis:
    image: redis:7-alpine
    container_name: rai_redis
    restart: unless-stopped
    command: redis-server --requirepass rai_redis_pass --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "rai_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rai_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: rai_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rai_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rai_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: rai_user
      RABBITMQ_DEFAULT_PASS: rai_rabbit_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rai_network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rai_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - rai_network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: rai_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rai_network

  loki:
    image: grafana/loki:2.9.0
    container_name: rai_loki
    restart: unless-stopped
    ports:
      - "3110:3100"
    volumes:
      - ./infrastructure/monitoring/loki/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - rai_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  rai_network:
    driver: bridge
